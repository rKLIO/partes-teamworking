services:

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: partes_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7.0-alpine
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    stdin_open: true
    tty: true

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    stdin_open: true
    tty: true

  realtime:
    build: ./realtime
    volumes:
      - ./realtime:/app
      - realtime_node_modules:/app/node_modules
    ports:
      - "4000:4000"
    environment:
      REDIS_HOST: redis
    depends_on:
      - redis
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  frontend_node_modules:
  realtime_node_modules:
